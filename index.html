<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GAMZAISSAC</title>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="game-over-overlay" hidden>
      <section
        class="game-over-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="game-over-title"
      >
        <h1 id="game-over-title"></h1>
        <p id="game-over-summary"></p>
        <button id="game-over-restart" type="button"></button>
      </section>
    </div>
    <aside id="developer-console" hidden aria-label="개발자 콘솔">
      <header id="developer-console-drag-handle">
        <strong>DEV CONSOLE</strong>
        <span>드래그로 이동 · ` 또는 Esc로 닫기</span>
      </header>
      <div id="developer-console-output" role="log" aria-live="polite"></div>
      <form id="developer-console-form" autocomplete="off">
        <label for="developer-console-input">&gt;</label>
        <input
          id="developer-console-input"
          type="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="개발자 명령어"
        />
      </form>
      <div
        id="developer-console-suggestions"
        hidden
        role="listbox"
        aria-label="명령어 자동완성"
      ></div>
      <section id="developer-console-item-picker" hidden aria-label="아이템 생성 선택">
        <div class="developer-item-picker-title">
          <strong>ITEM SPAWN</strong>
          <span>방향키 선택 · Space/Enter 또는 클릭으로 생성 · Esc 닫기</span>
        </div>
        <div id="developer-console-item-grid" role="grid" aria-label="생성할 아이템"></div>
      </section>
      <div id="developer-console-resize-handle" aria-hidden="true"></div>
    </aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
